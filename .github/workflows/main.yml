# Generated by Gemini 3.5 Flash
name: Run Python Script and Notebook

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    # Permissions needed to commit and push changes back to the repo
    permissions:
      contents: write

    steps:
    # 1. Checkout the repository code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.11' # You can change this to your preferred Python version
        cache: 'pip'                # Caches pip dependencies for faster subsequent runs

    # 3. Install requirements (including Jupyter/nbconvert to run the notebook)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install jupyter nbconvert  # Required to execute the .ipynb file

    # Temporary .env file
    - name: Create .env file
      run: |
        echo "tiingo_api_token=${{ tiingo_api_token }}" >> .env
        echo "hugging_face_token=${{ secrets.hugging_face_token }}" >> .env

    # 4. Run the main.py file
    - name: Run main.py
      run: python main.py

    # 5. Execute the Jupyter Notebook
    # This executes the notebook in-place and saves the outputs inside it
    - name: Run Neural Network Notebook
      run: |
        jupyter nbconvert --to notebook --execute --inplace models/neural_network.ipynb

    # 6. Commit and push changed CSV files
    - name: Commit and push updated CSVs
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Stage only modified or new CSV files
        git add data/*.csv models/*.ipynb  # Adjust paths if your CSVs are in specific folders
        
        # Check if there are actually any changes to commit so the workflow doesn't fail
        if git diff --staged --quiet; then
          echo "No CSV changes detected. Skipping commit."
        else
          git commit -m "chore: automated CSV update from GitHub Action"
          git push
        fi
